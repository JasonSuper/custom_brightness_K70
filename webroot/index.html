<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>K70亮度增强 - 配置中心</title>
    <style>
        :root {
            --primary: #8b5cf6;
            --primary-light: #a78bfa;
            --primary-pink: #ec4899;
            --bg: #f5f3ff;
            --bg-card: #ffffff;
            --bg-card-hover: #faf5ff;
            --bg-input: #f8fafc;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --shadow: rgba(139, 92, 246, 0.1);
            --shadow-hover: rgba(139, 92, 246, 0.2);
            --success: #10b981;
            --danger: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #f5f3ff 0%, #fdf2f8 100%);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            padding: 16px 16px 140px;
        }

        .header {
            text-align: center;
            padding: 20px 0 24px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--primary-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .header p { color: var(--text-secondary); font-size: 14px; }

        .loading, .error-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 16px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .error-box {
            background: rgba(239, 68, 68, 0.05);
            border: 1px solid var(--danger);
            border-radius: 20px;
            color: var(--danger);
            margin: 20px 0;
            box-shadow: 0 4px 16px rgba(239, 68, 68, 0.08);
        }

        .info-box {
            background: rgba(139, 92, 246, 0.05);
            border: 1px solid var(--primary-light);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 16px;
            box-shadow: 0 4px 16px var(--shadow);
        }

        .info-box p {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .info-box p:last-child { margin-bottom: 0; }

        .config-section {
            background: var(--bg-card);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 20px var(--shadow);
            transition: all 0.3s ease;
        }

        .config-section:hover {
            box-shadow: 0 8px 30px var(--shadow-hover);
            transform: translateY(-2px);
        }

        .section-header {
            display: flex;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
        }

        .section-header.no-collapse { cursor: default; }

        .section-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--primary), #a855f7);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
            font-size: 20px;
        }

        .section-title { flex: 1; }

        .section-title h2 { font-size: 16px; font-weight: 600; margin-bottom: 2px; }

        .section-title p { font-size: 12px; color: var(--text-secondary); }

        .section-toggle {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            transition: transform 0.3s ease;
            font-size: 12px;
        }

        .section-toggle.expanded { transform: rotate(180deg); }

        .section-content {
            overflow: hidden;
            transition: max-height 0.3s ease, opacity 0.3s ease;
            max-height: 2000px;
            opacity: 1;
        }

        .section-content.collapsed {
            max-height: 0;
            opacity: 0;
            padding-top: 0;
            padding-bottom: 0;
        }

        .config-item {
            margin-bottom: 20px;
        }

        .config-item:last-child { margin-bottom: 0; }

        .config-item label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .config-item .description {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        input[type="number"], input[type="text"] {
            width: 100%;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 12px 16px;
            color: var(--text-primary);
            font-size: 14px;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }

        input[type="number"]:focus, input[type="text"]:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.1);
        }

        .segment-card {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid var(--border);
            box-shadow: 0 2px 12px var(--shadow);
        }

        .segment-card:last-child { margin-bottom: 0; }

        .segment-header {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
        }

        .segment-badge {
            background: linear-gradient(135deg, var(--primary), var(--primary-pink));
            color: white;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-right: 12px;
        }

        .segment-label { font-size: 14px; color: var(--text-secondary); }

        .segment-inputs {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .segment-row {
            display: flex;
            gap: 12px;
            margin-bottom: 8px;
        }

        .segment-row:last-child {
            margin-bottom: 0;
        }

        .segment-row > div {
            flex: 1;
        }

        .segment-inputs label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 4px;
            display: block;
        }

        .floating-save {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
        }

        .save-btn {
            background: linear-gradient(135deg, var(--primary), var(--primary-pink));
            color: white;
            border: none;
            padding: 14px 40px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 8px 32px var(--shadow-hover);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .save-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(236, 72, 153, 0.25);
        }

        .save-btn:active { transform: translateY(0); }

        .save-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 12px 24px;
            border-radius: 20px;
            font-size: 14px;
            box-shadow: 0 8px 32px var(--shadow);
            z-index: 2000;
            transition: transform 0.3s ease;
        }

        .toast.show { transform: translateX(-50%) translateY(0); }

        .toast.success { border-color: var(--success); }

        .toast.error { border-color: var(--danger); }

        @media (max-width: 480px) {
            body { padding: 12px 12px 120px; }
            .header h1 { font-size: 20px; }
            .segment-inputs { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>💡 K70亮度增强配置中心</h1>
        <p>自定义您的亮度调节体验</p>
    </div>

    <div id="loading" class="loading">
        <div class="spinner"></div>
        <p style="color: var(--text-secondary);">正在加载配置...</p>
    </div>

    <div id="error" class="error-box" style="display: none;">
        <p>⚠️ <span id="error-message"></span></p>
    </div>

    <div id="config-container" style="display: none;"></div>

    <div class="floating-save">
        <button class="save-btn" id="saveBtn" onclick="saveConfig()">
            <span>💾</span><span>保存配置</span>
        </button>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        const CONFIG_PATH = '/data/adb/modules/custom_brightness_K70/config.conf';

        const SEGMENTS = [
            { name: '极暗环境', default: '0,4,7,12' },
            { name: '暗光环境', default: '5,19,15,30' },
            { name: '室内环境', default: '20,39,31,52' },
            { name: '明亮室内', default: '40,459,53,70' },
            { name: '阴天室外', default: '460,999,71,120' },
            { name: '晴天室内', default: '1000,1299,121,155' },
            { name: '晴天室外', default: '1300,2400,156,255' }
        ];

        const SECTIONS = [
            {
                id: 'segments', icon: '🎚️', title: '亮度分段配置', desc: '不同光线环境下的亮度映射',
                collapsible: false,
                render: () => renderSegments()
            },
            {
                id: 'log', icon: '📋', title: '日志配置', desc: '控制系统日志记录',
                collapsible: true, collapsed: true,
                items: [
                    { key: 'log_path', label: '日志文件路径', type: 'text', placeholder: '/data/local/tmp/brightness_curve.log' },
                    { key: 'log_max_size', label: '日志文件最大字节数', desc: '超过此大小后自动轮转', type: 'number', min: 10240, max: 1048576, step: 1024, default: 131072 },
                    { key: 'log_buffer_size', label: '日志缓冲区大小', desc: '日志写入的缓冲区大小（字节）', type: 'number', min: 1024, max: 65536, step: 1024, default: 4096 }
                ]
            },
            {
                id: 'hysteresis', icon: '🔄', title: '滞回阈值配置', desc: '亮度变化的平滑控制',
                collapsible: false,
                items: [
                    { key: 'hysteresis_up', label: '滞回上升系数', desc: '亮度提升时的滞回系数（值越小响应越快）', type: 'number', min: 0.01, max: 1, step: 0.01, default: 0.15 },
                    { key: 'hysteresis_down', label: '滞回下降系数', desc: '亮度变暗时的滞回系数（值越大防抖动效果越好）', type: 'number', min: 0.01, max: 1, step: 0.01, default: 0.2 }
                ]
            },
            {
                id: 'window', icon: '📊', title: '滑动窗口配置', desc: '传感器数据平滑处理',
                collapsible: false,
                items: [
                    { key: 'window_size', label: '窗口大小', desc: '维护最近N个光线值（建议值：5-15）', type: 'number', min: 3, max: 25, step: 1, default: 7 },
                    { key: 'spurious_threshold', label: '突变阈值百分比', desc: '检测瞬时噪声时使用（0-1之间）', type: 'number', min: 0.1, max: 1, step: 0.05, default: 0.3 }
                ]
            },
            {
                id: 'auto', icon: '⏰', title: '自动亮度检测', desc: '自动调整检测频率',
                collapsible: true, collapsed: true,
                items: [
                    { key: 'auto_brightness_check_interval_seconds', label: '检查间隔（秒）', desc: '自动亮度检查间隔（秒）', type: 'number', min: 1, max: 30, step: 1, default: 5 }
                ]
            },
            {
                id: 'fusion', icon: '🔀', title: '亮度融合算法', desc: '前后置传感器数据融合',
                collapsible: true, collapsed: true,
                items: [
                    { key: 'back_lux_threshold_ratio', label: '后置lux触发前置模式阈值', desc: '当后置lux > 前置lux × 此值时使用前置', type: 'number', min: 1, max: 100, step: 1, default: 50 },
                    { key: 'back_lux_fusion_ratio', label: '后置lux加权融合阈值', desc: '当后置lux >= 前置lux × 此值时启用加权', type: 'number', min: 0.5, max: 10, step: 0.1, default: 2 },
                    { key: 'back_lux_weight', label: '后置传感器融合权重', desc: '后置传感器数据权重（0-1之间）', type: 'number', min: 0, max: 1, step: 0.05, default: 0.3 },
                    { key: 'front_lux_weight', label: '前置传感器融合权重', desc: '前置传感器数据权重（0-1之间）', type: 'number', min: 0, max: 1, step: 0.05, default: 0.2 },
                    { key: 'max_lux', label: '最大lux值', desc: '亮度映射的最大lux值', type: 'number', min: 1000, max: 5000, step: 100, default: 2400, fullWidth: true }
                ]
            },
            {
                id: 'prediction', icon: '📈', title: '趋势预测配置', desc: '亮度变化的智能预测',
                collapsible: true, collapsed: true,
                items: [
                    { key: 'window_mean_weight', label: '窗口均值权重', desc: '历史数据权重（0.0-1.0）', type: 'number', min: 0, max: 1, step: 0.05, default: 0.7 },
                    { key: 'prediction_weight', label: '预测值权重', desc: '预测数据权重（0.0-1.0）', type: 'number', min: 0, max: 1, step: 0.05, default: 0.3 },
                    { key: 'min_change_threshold', label: '最小变化阈值', desc: '最小亮度变化阈值（lux）', type: 'number', min: 1, max: 50, step: 1, default: 5 },
                    { key: 'change_threshold_percent', label: '变化阈值百分比', desc: '相对变化阈值百分比（0-1之间）', type: 'number', min: 0, max: 0.5, step: 0.01, default: 0.05 }
                ]
            },
            {
                id: 'brightness', icon: '☀️', title: '亮度调整配置', desc: '基础亮度参数',
                collapsible: false,
                items: [
                    { key: 'min_brightness_delta', label: '最小变化值', desc: '触发亮度调整的最小变化量', type: 'number', min: 1, max: 20, step: 1, default: 2 },
                    { key: 'max_lux_for_brightness', label: '最大lux', desc: '用于亮度转换的最大lux值', type: 'number', min: 1000, max: 5000, step: 100, default: 2400 }
                ]
            },
            {
                id: 'sensor', icon: '📡', title: '传感器配置', desc: '传感器采样设置',
                collapsible: false,
                items: [
                    { key: 'sensor_sample_rate_ms', label: '采样率（毫秒）', desc: '传感器采样间隔', type: 'number', min: 100, max: 2000, step: 100, default: 200 },
                    { key: 'startup_delay_seconds', label: '启动延迟（秒）', desc: '程序启动后等待系统完全启动的时间', type: 'number', min: 1, max: 30, step: 1, default: 5 },
                    { key: 'poll_interval_ms', label: '轮询间隔（毫秒）', desc: '主循环的轮询间隔', type: 'number', min: 50, max: 500, step: 10, default: 100, fullWidth: true }
                ]
            }
        ];

        let configData = {};

        async function loadConfig() {
            try {
                const base64Str = await ksu.exec(`base64 -w 0 "${CONFIG_PATH}"`);
                const content = decodeURIComponent(escape(atob(base64Str)));
                parseConfig(content);
                renderUI();
                document.getElementById('loading').style.display = 'none';
                document.getElementById('config-container').style.display = 'block';
                // showToast('✅ 配置加载成功', 'success');
            } catch (error) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'flex';
                document.getElementById('error-message').textContent = error.message || '加载配置失败';
            }
        }

        function parseConfig(content) {
            configData = {};
            content.split('\n').forEach(line => {
                const trimmed = line.trim();
                if (!trimmed || trimmed.startsWith('#') || !trimmed.includes('=')) return;

                const eqIndex = trimmed.indexOf('=');
                const key = trimmed.substring(0, eqIndex).trim();
                let value = trimmed.substring(eqIndex + 1).split('#')[0].trim();

                if (!key || !value) return;
                configData[key] = isNaN(value) ? value : (value.includes('.') ? parseFloat(value) : parseInt(value));
            });
        }

        function getValue(key, defaultVal) {
            return configData[key] !== undefined ? configData[key] : defaultVal;
        }

        function renderUI() {
            const container = document.getElementById('config-container');
            container.innerHTML = `
                ${SECTIONS.map(section => renderSection(section)).join('')}
            `;
        }

        function renderSection(section) {
            const collapsed = section.collapsed ? 'collapsed' : '';
            const toggleExpanded = section.collapsed ? '' : 'expanded';
            const headerClass = section.collapsible ? '' : 'no-collapse';
            const headerClick = section.collapsible ? `onclick="toggleSection('${section.id}')"` : '';

            return `
                <div class="config-section" id="section-${section.id}">
                    <div class="section-header ${headerClass}" ${headerClick}>
                        <div class="section-icon">${section.icon}</div>
                        <div class="section-title">
                            <h2>${section.title}</h2>
                            <p>${section.desc}</p>
                        </div>
                        ${section.collapsible ? `<div class="section-toggle ${toggleExpanded}" id="toggle-${section.id}">▲</div>` : ''}
                    </div>
                    <div class="section-content ${collapsed}" id="content-${section.id}">
                        ${section.render ? section.render() : renderItems(section.items)}
                    </div>
                </div>
            `;
        }

        function renderItems(items) {
            return items.map(item => `
                <div class="config-item">
                    <label>${item.label}</label>
                    ${item.desc ? `<div class="description">${item.desc}</div>` : ''}
                    <input type="${item.type}" id="${item.key}"
                        ${item.placeholder ? `placeholder="${item.placeholder}"` : ''}
                        ${item.min !== undefined ? `min="${item.min}"` : ''}
                        ${item.max !== undefined ? `max="${item.max}"` : ''}
                        ${item.step !== undefined ? `step="${item.step}"` : ''}
                        value="${getValue(item.key, item.default)}">
                </div>
            `).join('');
        }

        function renderSegments() {
            return `<div class="segment-cards">
                ${SEGMENTS.map((seg, i) => {
                    const key = `segments.${i + 1}`;
                    const val = (configData[key] || seg.default).split(',').map(Number);
                    const [lux_min, lux_max, brightness_min, brightness_max] = val;
                    return `
                        <div class="segment-card">
                            <div class="segment-header">
                                <span class="segment-badge">分段 ${i + 1}</span>
                                <span class="segment-label">${seg.name}</span>
                            </div>
                            <div class="segment-row">
                                <div><label>最小lux</label><input type="number" id="${key}_lux_min" value="${lux_min}" min="0" max="10000"></div>
                                <div><label>最大lux</label><input type="number" id="${key}_lux_max" value="${lux_max}" min="0" max="10000"></div>
                            </div>
                            <div class="segment-row">
                                <div><label>最小亮度</label><input type="number" id="${key}_brightness_min" value="${brightness_min}" min="0" max="255"></div>
                                <div><label>最大亮度</label><input type="number" id="${key}_brightness_max" value="${brightness_max}" min="0" max="255"></div>
                            </div>
                        </div>
                    `;
                }).join('')}
            </div>`;
        }

        async function saveConfig() {
            const btn = document.getElementById('saveBtn');
            btn.disabled = true;
            btn.innerHTML = '<span>⏳</span><span>保存中...</span>';

            try {
                collectFormData();
                const content = generateConfigFile();
                const base64Content = btoa(unescape(encodeURIComponent(content)));
                await ksu.exec(`echo "${base64Content}" | base64 -d > "${CONFIG_PATH}"`);
                showToast('✅ 配置保存成功！', 'success');
            } catch (error) {
                showToast('❌ 保存失败: ' + (error.message || '未知错误'), 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<span>💾</span><span>保存配置</span>';
            }
        }

        function collectFormData() {
            SECTIONS.forEach(section => {
                if (!section.items) return;
                section.items.forEach(item => {
                    const input = document.getElementById(item.key);
                    if (input) {
                        configData[item.key] = item.type === 'number' ? parseFloat(input.value) : input.value;
                    }
                });
            });

            SEGMENTS.forEach((_, i) => {
                const key = `segments.${i + 1}`;
                configData[key] = [
                    document.getElementById(`${key}_lux_min`).value || 0,
                    document.getElementById(`${key}_lux_max`).value || 0,
                    document.getElementById(`${key}_brightness_min`).value || 0,
                    document.getElementById(`${key}_brightness_max`).value || 0
                ].join(',');
            });
        }

        function generateConfigFile() {
            const d = (k, v) => configData[k] !== undefined ? configData[k] : v;
            return `# K70专用亮度增强v1.7.6 配置文件
# 适配: 红米K70

# ==================== 日志配置 ====================
log_path=${d('log_path', '/data/local/tmp/brightness_curve.log')}
log_max_size=${d('log_max_size', 131072)}
log_buffer_size=${d('log_buffer_size', 4096)}

# ==================== 非对称滞回阈值配置 ====================
hysteresis_up=${d('hysteresis_up', 0.15)}
hysteresis_down=${d('hysteresis_down', 0.2)}

# ==================== 滑动窗口配置 ====================
window_size=${d('window_size', 7)}
spurious_threshold=${d('spurious_threshold', 0.3)}

# ==================== 自动亮度检测配置 ====================
auto_brightness_check_interval_seconds=${d('auto_brightness_check_interval_seconds', 5)}

# ==================== 亮度融合算法配置 ====================
back_lux_threshold_ratio=${d('back_lux_threshold_ratio', 50.0)}
back_lux_fusion_ratio=${d('back_lux_fusion_ratio', 2.0)}
back_lux_weight=${d('back_lux_weight', 0.3)}
front_lux_weight=${d('front_lux_weight', 0.2)}
max_lux=${d('max_lux', 2400.0)}

# ==================== 趋势预测配置 ====================

        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast show ${type}`;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function toggleSection(sectionId) {
            const content = document.getElementById(`content-${sectionId}`);
            const toggle = document.getElementById(`toggle-${sectionId}`);
            const isCollapsed = content.classList.toggle('collapsed');
            toggle.classList.toggle('expanded', !isCollapsed);
        }

        window.onload = loadConfig;
