# K70专用亮度增强v1.7.6 配置文件
# 适配: 红米K70

# ==================== 日志配置 ====================
# 日志文件路径
log_path=/data/local/tmp/brightness_curve.log
# 日志文件最大字节数（超过后自动轮转）
log_max_size=131072
# 日志写缓冲区大小
log_buffer_size=4096

# ==================== 非对称滞回阈值配置 ====================
# hysteresis_up: 亮度提升时的滞回系数（值越小响应越快）
# hysteresis_down: 亮度变暗时的滞回系数（值越大防抖动效果越好）
hysteresis_up=0.15
hysteresis_down=0.2

# ==================== 滑动窗口配置 ====================
# 滑动窗口大小，维护最近N个光线值（建议值：5-15）
window_size=10
# 突变阈值百分比，检测瞬时噪声时使用
spurious_threshold=0.3

# ==================== 自动亮度检测配置 ====================
# 自动亮度检查间隔（秒）
auto_brightness_check_interval_seconds=5

# ==================== 亮度融合算法配置 ====================
# 后置传感器lux触发仅前置模式阈值（当后置lux > 前置lux * 此值时使用前置）
back_lux_threshold_ratio=50.0
# 后置传感器lux启用加权融合阈值（当后置lux >= 前置lux * 此值时启用加权）
back_lux_fusion_ratio=2.0
# 后置传感器融合权重
back_lux_weight=0.3
# 前置传感器融合权重
front_lux_weight=0.2
# 最大lux值限制
max_lux=2400.0

# ==================== 趋势预测配置 ====================
# 窗口均值权重（0.0-1.0）
window_mean_weight=0.7
# 预测值权重（0.0-1.0）
prediction_weight=0.3
# 最小变化阈值（lux）
min_change_threshold=1.0
# 变化阈值百分比
change_threshold_percent=0.05

# ==================== 亮度调整配置 ====================
# 最小亮度变化值
min_brightness_delta=1
# 最大lux映射值（用于亮度转换）
max_lux_for_brightness=2400

# ==================== 传感器配置 ====================
# 传感器采样率（毫秒）
sensor_sample_rate_ms=200
# 程序启动后延迟秒数（等待系统完全启动）
startup_delay_seconds=5
# 主循环轮询间隔（毫秒）
poll_interval_ms=200

# ==================== 亮度分段配置 ====================
# 格式：segments.<序号>=lux_min,lux_max,brightness_min,brightness_max
# 分段说明：
# - 极暗环境：0-4 lux，亮度范围 6-20
# - 暗光环境：5-19 lux，亮度范围 21-30
# - 室内环境：20-39 lux，亮度范围 31-52
# - 明亮室内：40-299 lux，亮度范围 53-80
# - 阴天室外：300-899 lux，亮度范围 81-125
# - 晴天室内：900-1199 lux，亮度范围 126-185
# - 晴天室外：1200-2400 lux，亮度范围 186-255
#
segments.1=0,4,7,12       # 极暗环境
segments.2=5,19,13,30     # 暗光环境
segments.3=20,39,31,52    # 室内环境
segments.4=40,459,53,70   # 明亮室内
segments.5=460,999,71,120 # 阴天室外
segments.6=1000,1299,121,155 # 晴天室内
segments.7=1300,2400,156,255  # 晴天室外
